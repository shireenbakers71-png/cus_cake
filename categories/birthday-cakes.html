    const container = document.getElementById('cakes-container');
    const ratePerPound = 1500;

    imageFiles.forEach((file) => {
      const col = document.createElement('div');
      col.className = 'col';
      col.innerHTML = `
        <div class="cake-card h-100 d-flex flex-column shadow-sm">
          <img src="../images/birthday_cakes_400/${file}" alt="Birthday Cake" class="cake-img" loading="lazy">
          <div class="cake-body d-flex flex-column flex-grow-1">
            <div class="mb-3">
              <label class="form-label" style="color: #6c6c6c; font-weight: 600;">Select Weight:</label>
              <select class="form-select weight-select">
                <option value="0.5">Bento cake (1/2 lbs)</option>
                <option value="1" selected>1 lb</option>
                <option value="2">2 lbs</option>
                <option value="custom">Custom lbs</option>
              </select>
              <div class="custom-weight-container mt-2" style="display: none;">
                <input type="number" class="form-control custom-weight-input" placeholder="Enter lbs (e.g., 3)" min="0.5" step="0.5">
              </div>
            </div>
            <div class="mt-auto d-flex justify-content-between align-items-center pt-3" style="border-top: 1px dashed #ddd;">
              <span style="color: #6c6c6c; font-size: 1em; font-weight: 600;">Price:</span>
              <h5 class="price-display m-0" style="color: #f7c873; font-weight: bold;">Rs. 1,500</h5>
            </div>
          </div>
        </div>
      `;
      container.appendChild(col);
    });

    container.addEventListener('change', function(e) {
      if (e.target.classList.contains('weight-select')) {
        updatePrice(e.target);
      }
    });

    container.addEventListener('input', function(e) {
      if (e.target.classList.contains('custom-weight-input')) {
        const selectElement = e.target.closest('.cake-body').querySelector('.weight-select');
        updatePrice(selectElement);
      }
    });

    function updatePrice(selectElement) {
      const cardBody = selectElement.closest('.cake-body');
      const customContainer = cardBody.querySelector('.custom-weight-container');
      const customInput = cardBody.querySelector('.custom-weight-input');
      const priceDisplay = cardBody.querySelector('.price-display');
      
      let price = 0;
      
      if (selectElement.value === 'custom') {
        customContainer.style.display = 'block';
        const customVal = parseFloat(customInput.value) || 0;
        price = customVal * ratePerPound;
      } else {
        customContainer.style.display = 'none';
        const val = parseFloat(selectElement.value) || 0;
        price = val * ratePerPound;
      }
      
      priceDisplay.textContent = price > 0 ? `Rs. ${price.toLocaleString()}` : 'Rs. 0';
    }
  </script>
