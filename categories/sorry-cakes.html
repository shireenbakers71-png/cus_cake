<body class="custom-category-page">

        <span class="custom-category-logo-text">SHIREEN <span>BAKERS</span></span>

<div class="container container-fluid mt-3 mb-5">
    <!-- Header Area -->
    <div class="top-bar d-flex justify-content-center align-items-center mb-4 pb-2 border-bottom">
      <h2 class="page-title m-0">SORRY <span>CAKES</span></h2>
    </div>

    <!-- Cakes Grid: 3 in a row -->
    <div class="row row-cols-2 row-cols-md-3 g-2 g-md-4" id="cakes-container">
      <!-- Generated Cards via Script -->
    </div>
  </div>

  <script>
    const imageFiles = ["PhotoshopExtension_Image (1).webp","PhotoshopExtension_Image (10).webp","PhotoshopExtension_Image (11).webp","PhotoshopExtension_Image (12).webp","PhotoshopExtension_Image (13).webp","PhotoshopExtension_Image (14).webp","PhotoshopExtension_Image (2).webp","PhotoshopExtension_Image (3).webp","PhotoshopExtension_Image (4).webp","PhotoshopExtension_Image (5).webp","PhotoshopExtension_Image (6).webp","PhotoshopExtension_Image (7).webp","PhotoshopExtension_Image (9).webp","PhotoshopExtension_Image.webp"];;

    const container = document.getElementById('cakes-container');
    const ratePerPound = 1500;

    imageFiles.forEach((file) => {
      const col = document.createElement('div');
      col.className = 'col';
      col.innerHTML = `
        <div class="cake-card h-100 d-flex flex-column shadow-sm">
          <img src="../images/sorry cake/${file}" alt="Sorry Cake" class="cake-img" loading="lazy">
          <div class="cake-body d-flex flex-column flex-grow-1">
            <div class="mb-3">
              <label class="form-label" style="color: #6c6c6c; font-weight: 600;">Select Weight:</label>
              <select class="form-select weight-select">
                <option value="0.5">Bento cake (1/2 lbs)</option>
                <option value="1" selected>1 lb</option>
                <option value="2">2 lbs</option>
                <option value="custom">Custom lbs</option>
              </select>
              <div class="custom-weight-container mt-2" style="display: none;">
                <input type="number" class="form-control custom-weight-input" placeholder="Enter lbs (e.g., 3)" min="0.5" step="0.5">
              </div>
            </div>
            <div class="mt-auto d-flex justify-content-between align-items-center pt-3" style="border-top: 1px dashed #ddd;">
              <span style="color: #6c6c6c; font-size: 1em; font-weight: 600;">Price:</span>
              <h5 class="price-display m-0" style="color: #f7c873; font-weight: bold;">Rs. 1,500</h5>
            </div>
            <a href="#" class="order-now-btn" onclick="openWhatsApp(this, event)" style="margin-top:12px;width:100%;background:#25D366;color:#fff;border:none;padding:10px;border-radius:6px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.95rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.399a7.682 7.682 0 0 0-10.86 0 7.636 7.636 0 0 0-2.012 5.087c0 1.636.425 3.235 1.232 4.65l-1.325 4.846 4.954-1.3a7.71 7.71 0 0 0 4.011 1.111h.001c4.254 0 7.715-3.46 7.715-7.714a7.675 7.675 0 0 0-2.253-5.462zM8.5 13.911a6.388 6.388 0 0 1-3.257-.887l-.234-.139-2.42.636.645-2.358-.153-.243a6.357 6.357 0 0 1-1.025-3.472C2.056 3.996 5.53 1.332 9.006 1.332c1.725 0 3.35.672 4.568 1.892 1.218 1.22 1.889 2.843 1.889 4.568 0 3.472-2.824 6.297-6.297 6.297z"/><path d="M11.854 9.692c-.17-.085-1.002-.495-1.157-.552-.155-.057-.268-.085-.38.085-.113.17-.438.552-.537.665-.099.113-.198.128-.368.043-.17-.085-.716-.264-1.364-.845-.505-.452-.846-1.003-.945-1.173-.099-.17-.01-.262.075-.347.075-.075.17-.198.255-.298.085-.099.113-.17.17-.283.057-.113.028-.212-.014-.298-.043-.085-.38-1.018-.521-1.396-.139-.368-.28-.318-.38-.323-.094-.005-.203-.005-.311-.005a.604.604 0 0 0-.437.203c-.155.17-.594.58-.594 1.414s.608 1.64.693 1.753c.085.113 1.196 1.828 2.898 2.544.405.17.72.271.966.347.408.128.78.11 1.074.068.328-.047 1.002-.41 1.144-.805.141-.395.141-.734.099-.805-.043-.07-.156-.113-.326-.198z"/></svg>
              Order Now
            </a>
          </div>
        </div>
      `;
      container.appendChild(col);
    });

    container.addEventListener('change', function(e) {
      if (e.target.classList.contains('weight-select')) {
        updatePrice(e.target);
      }
    });

    container.addEventListener('input', function(e) {
      if (e.target.classList.contains('custom-weight-input')) {
        const selectElement = e.target.closest('.cake-body').querySelector('.weight-select');
        updatePrice(selectElement);
      }
    });

    function updatePrice(selectElement) {
      const cardBody = selectElement.closest('.cake-body');
      const customContainer = cardBody.querySelector('.custom-weight-container');
      const customInput = cardBody.querySelector('.custom-weight-input');
      const priceDisplay = cardBody.querySelector('.price-display');
      
      let price = 0;
      
      if (selectElement.value === 'custom') {
        customContainer.style.display = 'block';
        const customVal = parseFloat(customInput.value) || 0;
        price = customVal * ratePerPound;
      } else {
        customContainer.style.display = 'none';
        const val = parseFloat(selectElement.value) || 0;
        price = val * ratePerPound;
      }
      
      priceDisplay.textContent = price > 0 ? `Rs. ${price.toLocaleString()}` : 'Rs. 0';
    }

                function openWhatsApp(btn, event) {
      event.preventDefault();
      var cardBody = btn.closest('.cake-body');
      var sel = cardBody.querySelector('.weight-select');
      var customIn = cardBody.querySelector('.custom-weight-input');
      var priceEl = cardBody.querySelector('.price-display');
      var weight;
      if (sel.value === 'custom') {
        weight = customIn && customIn.value ? customIn.value + ' lbs' : 'custom';
      } else {
        weight = sel.options[sel.selectedIndex].text;
      }
      var price = priceEl.textContent;
      var cakeType = '';
      var titleEl = document.querySelector('.page-title');
      if (titleEl) cakeType = titleEl.textContent.trim().replace(/\s+/g, ' ');

      var msg = 'Hi Shireen Bakers!' + '\n\n' +
        'I would like to order this cake:' + '\n' +
        '*Category*: ' + cakeType + '\n' +
        '*Weight*: ' + weight + '\n' +
        '*Price*: ' + price + '\n\n' +
        'Please confirm availability and delivery.';

      window.location.href = 'https://wa.me/923288521441?text=' + encodeURIComponent(msg);
    }
  </script>

            </svg>
          </a>
          <a href="#" class="social-circle" aria-label="Facebook" target="_blank" rel="noopener noreferrer">

        </div>
      </div>
